<html lang="en"><head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&amp;family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #317eff;
            --bg-light: #f9fbff;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .rise-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        h2 { font-weight: 600; font-size: 28px; margin: 0; color: #333; }
        p.subtitle { font-size: 18px; color: #666; margin: 10px 0 20px 0; }

        /* Animation Section */
        .wave-box {
            position: relative;
            height: 120px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid rgba(49, 126, 254, 0.1);
        }

        .filter-line {
            position: absolute;
            left: 50%;
            top: 10%;
            bottom: 10%;
            width: 3px;
            background: #ff4d4d;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.4);
            z-index: 10;
        }

        /* Vertical Cards Section */
        .items-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .list-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation: fadeInUp 0.8s forwards;
            border: 2px solid transparent;
            font-size: 18px;
            cursor: pointer;
        }

        .list-item:nth-child(1) { animation-delay: 0.3s; }
        .list-item:nth-child(2) { animation-delay: 0.5s; }

        .list-item.active, .list-item:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 15px 30px rgba(49, 126, 254, 0.1);
        }

        .material-icons {
            margin-bottom: 15px;
            font-size: 40px;
            color: #d1d9e6;
            transition: all 0.3s ease;
        }

        .active .material-icons, .list-item:hover .material-icons {
            color: var(--primary);
            transform: scale(1.1);
        }

        .list-item.active {
            color: var(--primary);
            font-weight: 600;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .items-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="rise-container">

    <p class="subtitle">Through your evaluations, you help AI models:</p>

    </div>

    <div class="items-container">
        <div class="list-item" id="item1">
            <span class="material-icons">hearing</span>
            Hear real-world speech more accurately
        </div>
        <div class="list-item active" id="item2">
            <span class="material-icons">record_voice_over</span>
            Speak in ways humans understand and trust
        </div>
    </div>
</div>

<script>
    const noisyPath = document.getElementById('noisy-wave');
    const cleanPath = document.getElementById('clean-wave');
    let offset = 0;

    function drawWaves() {
        let nPoints = "";
        let cPoints = "";
        
        for (let x = 0; x <= 800; x += 5) {
            // Slower frequency and reduced noise amplitude
            let baseSine = Math.sin((x + offset) * 0.03) * 20;
            let noise = (Math.random() - 0.5) * 12; // Reduced noise
            let yNoisy = 60 + baseSine + noise;
            let yClean = 60 + baseSine;

            if (x <= 400) {
                nPoints += `${x === 0 ? 'M' : 'L'} ${x} ${yNoisy} `;
                if (x === 400) cPoints += `M ${x} ${yNoisy} `;
            } else {
                cPoints += `L ${x} ${yClean} `;
            }
        }
        noisyPath.setAttribute('d', nPoints);
        cleanPath.setAttribute('d', cPoints);
        
        offset -= 0.8; // Reduced velocity
        requestAnimationFrame(drawWaves);
    }
    drawWaves();

    // Auto-highlight logic
    let current = 1;
    let autoPlay = true;

    const items = [document.getElementById('item1'), document.getElementById('item2')];

    function setActive(index) {
        items.forEach(item => item.classList.remove('active'));
        items[index].classList.add('active');
    }

    setInterval(() => {
        if(autoPlay) {
            current = current === 0 ? 1 : 0;
            setActive(current);
        }
    }, 3000);

    // Pause auto-play on hover
    items.forEach((item, idx) => {
        item.addEventListener('mouseenter', () => {
            autoPlay = false;
            setActive(idx);
        });
        item.addEventListener('mouseleave', () => {
            autoPlay = true;
            current = idx;
        });
    });
</script>


</body></html>
