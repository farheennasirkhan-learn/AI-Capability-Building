
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindset Switcher</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

    --bg-app:rgba(13,20,40,.78);
    --card-bg:rgba(255,255,255,.04);

    --border:rgba(255,255,255,.08);

    --brand-blue:#317EFF;
    --brand-blue-bright:#5E9EFF;

    --brand-white:#ffffff;
    --brand-grey:#9FA8BD;
    --brand-grey-light:#C5CAD5;

    --glass-blur:20px;

    --font:'Poppins',sans-serif;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:var(--font);

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px;

    overflow-x:hidden;

    background:

        radial-gradient(circle at 20% 10%, rgba(49,126,255,.15), transparent 28%),

        radial-gradient(circle at 80% 90%, rgba(49,126,255,.08), transparent 35%),

        linear-gradient(
            180deg,
            #182449 0%,
            #111A38 35%,
            #0B1228 70%,
            #060C1C 100%
        );

}

.widget-container{

    width:100%;
    max-width:960px;

    padding:55px;

    border-radius:30px;

    background:var(--bg-app);

    backdrop-filter:blur(var(--glass-blur));
    -webkit-backdrop-filter:blur(var(--glass-blur));

    border:1px solid rgba(255,255,255,.08);

    box-shadow:

        0 0 0 1px rgba(255,255,255,.03),

        0 25px 70px rgba(0,0,0,.45),

        0 0 80px rgba(49,126,255,.04);

    color:white;

    text-align:center;

}

h2{

    font-size:38px;
    font-weight:700;
    letter-spacing:-1px;
    margin-bottom:12px;

}

p{

    color:var(--brand-grey-light);

    margin-bottom:42px;

    line-height:1.6;

}

.toggle-wrapper{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:20px;

    margin-bottom:45px;

    font-size:13px;

    font-weight:600;

    text-transform:uppercase;

    letter-spacing:1px;

    cursor:pointer;

}

.toggle-label{

    color:#80879C;

    transition:.3s;

}

.label-dev.active{

    color:white;

}

.label-eval.active{

    color:var(--brand-blue);

}

.switch{

    position:relative;

    width:64px;

    height:34px;

}

.switch input{

    opacity:0;

}

.slider{

    position:absolute;

    inset:0;

    background:rgba(255,255,255,.08);

    border-radius:50px;

    border:1px solid rgba(255,255,255,.15);

    transition:.4s;

}

.slider:before{

    position:absolute;

    content:"";

    width:26px;

    height:26px;

    left:3px;

    bottom:3px;

    background:white;

    border-radius:50%;

    transition:.4s;

}

input:checked+.slider{

    background:var(--brand-blue);

}

input:checked+.slider:before{

    transform:translateX(30px);

}

.grid{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:25px;

}

.card{

    background:var(--card-bg);

    padding:35px 25px;

    border-radius:22px;

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(16px);

    transition:.35s;

    display:flex;

    flex-direction:column;

    align-items:center;

}

.card:hover{

    transform:translateY(-10px);

    box-shadow:

        0 20px 40px rgba(0,0,0,.35),

        0 0 35px rgba(49,126,255,.08);

}

.icon-box{

    width:68px;

    height:68px;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:30px;

    margin-bottom:22px;

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.08);

    transition:.35s;

}

.card-title{

    font-size:11px;

    text-transform:uppercase;

    letter-spacing:1.6px;

    color:#96A2BD;

    margin-bottom:14px;

    font-weight:700;

}

.card-content{

    font-size:20px;

    font-weight:600;

    color:white;

    min-height:55px;

    display:flex;

    align-items:center;

    justify-content:center;

    text-align:center;

}

.mode-dev .card{

    border-top:2px solid rgba(255,255,255,.25);

}

.mode-dev .card:hover{

    border-color:rgba(255,255,255,.25);

}

.mode-eval .card{

    background:rgba(49,126,255,.05);

    border-color:rgba(49,126,255,.30);

}

.mode-eval .card-title{

    color:var(--brand-blue);

}

.mode-eval .icon-box{

    background:rgba(49,126,255,.15);

    border-color:var(--brand-blue);

    box-shadow:0 0 20px rgba(49,126,255,.25);

    transform:scale(1.08);

}

.mode-eval .card:hover{

    background:rgba(49,126,255,.10);

    border-color:var(--brand-blue-bright);

}

@media(max-width:768px){

.grid{

grid-template-columns:1fr;

}

.widget-container{

padding:35px 20px;

}

}

</style>

</head>

<body>

<div class="widget-container mode-dev" id="appContainer">

<h2>Explore a New Mindset</h2>

<p>
Use the switch below to see how your experience as a developer prepares you for the role of a quality expert at Turing.
</p>

<div class="toggle-wrapper" onclick="document.getElementById('mindsetToggle').click()">

<span class="toggle-label label-dev active" id="labelDev">Developer Instinct</span>

<label class="switch" onclick="event.stopPropagation()">

<input type="checkbox" id="mindsetToggle" onchange="toggleMode()">

<span class="slider"></span>

</label>

<span class="toggle-label label-eval" id="labelEval">Turing Evaluator Mindset</span>

</div>

<div class="grid">

<div class="card">

<div class="icon-box" id="icon1">🛠️</div>

<div class="card-title">The Goal</div>

<div class="card-content" id="text1">Make it work</div>

</div>

<div class="card">

<div class="icon-box" id="icon2">🩹</div>

<div class="card-title">When I see bugs</div>

<div class="card-content" id="text2">Fix & Refactor</div>

</div>

<div class="card">

<div class="icon-box" id="icon3">🎨</div>

<div class="card-title">Success Standard</div>

<div class="card-content" id="text3">My Coding Style</div>

</div>

</div>

</div>

<script>

function toggleMode(){

const checkbox=document.getElementById("mindsetToggle");

const container=document.getElementById("appContainer");

const labelDev=document.getElementById("labelDev");

const labelEval=document.getElementById("labelEval");

const text1=document.getElementById("text1");
const text2=document.getElementById("text2");
const text3=document.getElementById("text3");

const icon1=document.getElementById("icon1");
const icon2=document.getElementById("icon2");
const icon3=document.getElementById("icon3");

if(checkbox.checked){

container.classList.replace("mode-dev","mode-eval");

labelDev.classList.remove("active");
labelEval.classList.add("active");

text1.textContent="Rate Accuracy";
text2.textContent="Identify & Penalize";
text3.textContent="Strict Rubric Rules";

icon1.textContent="📊";
icon2.textContent="🔍";
icon3.textContent="⚖️";

}
else{

container.classList.replace("mode-eval","mode-dev");

labelDev.classList.add("active");
labelEval.classList.remove("active");

text1.textContent="Make it work";
text2.textContent="Fix & Refactor";
text3.textContent="My Coding Style";

icon1.textContent="🛠️";
icon2.textContent="🩹";
icon3.textContent="🎨";

}

}

</script>

</body>
</html>
